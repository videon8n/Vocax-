version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
      testing:
        patterns: ["vitest*", "@vitest/*", "@testing-library/*", "playwright*", "@playwright/*"]
      next:
        patterns: ["next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react*"]
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: chore
      include: scope
